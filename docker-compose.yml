# docker-compose.yml
# ===================
# Levanta los 3 microservicios localmente para que los estudiantes verifiquen
# la comunicación entre ellos ANTES de desplegar en EKS.
#
# Uso:
#   docker compose up --build
#
# Luego probar (ver README.md para más ejemplos):
#   curl http://localhost:8003/orders -X POST -H "Content-Type: application/json" \
#        -d '{"product_id": 1, "quantity": 2}'
#
# Nota didáctica: Docker Compose crea una red interna donde cada servicio es
# alcanzable por su NOMBRE (products-service, inventory-service). Esto imita el
# DNS interno de Kubernetes, por eso el código no cambia entre local y EKS.

services:
  products-service:
    build: ./products-service
    image: products-service:local
    ports:
      - "8001:8001"   # expuesto al host solo para inspección directa
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  inventory-service:
    build: ./inventory-service
    image: inventory-service:local
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  orders-service:
    build: ./orders-service
    image: orders-service:local
    ports:
      - "8003:8003"
    environment:
      # Mismas URLs que en Kubernetes: nombre del servicio + puerto interno.
      PRODUCTS_SERVICE_URL: "http://products-service:8001"
      INVENTORY_SERVICE_URL: "http://inventory-service:8002"
    depends_on:
      products-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
